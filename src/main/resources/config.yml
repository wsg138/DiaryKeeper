# DiaryKeeper configuration
#
# Notes:
# - Diaries stay WRITABLE_BOOK items forever unless you intentionally redesign that behavior in code.
# - The plugin keeps text validation strict ASCII-only to reduce book-ban style abuse.
# - Delivery fallback is queue-only. If a player is offline or full, the diary waits safely.

give-on-first-join: true

# Editing / signing
allow-signing: false
owner-only-edit: true

restrictions:
  enderchest: true
  bundles: true
  shulkers: false
  chests: false
  barrels: false
  hoppers: false
  droppers: false
  dispensers: false
  furnaces: false

# Legacy behavior flag kept for compatibility.
# Container restriction listeners still enforce the specific restriction keys above.
allow-drop: true
allow-container-move: true

indestructible:
  prevent-combust: true
  prevent-explosion: true
  prevent-contact-damage: true
  prevent-despawn: true

void:
  return-to-dropper: true
  check-interval-ticks: 10
  safe-drop-if-inventory-full: false

appearance:
  enchanted-glint: true
  name-format: "&d{owner}'s Diary"
  lore:
    - "&7A unique collectible diary."
    - "&7Owner: &f{owner}"
    - "&8ID: {id-short}"

duplicates:
  warn-on-join: true
  warn-on-container-open: true
  warn-on-chunk-load: true
  warn-on-startup: true
  staff-notify: true
  debounce-seconds: 60
  max-listed-occurrences: 5

# Delivery queue tuning.
# These values cap work per tick so the plugin stays predictable with many players online.
delivery:
  retry-interval-ticks: 20
  max-players-per-tick: 10
  max-items-per-player-per-tick: 2

# Periodic persistence for player diary IDs and queued deliveries.
storage:
  save-interval-ticks: 1200
